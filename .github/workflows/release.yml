---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build archive and checksum
        run: |
          mkdir dist
          zip -r "dist/colab-remote-${{ github.ref_name }}.zip" .agents plugins install.ps1 README.md SECURITY.md CHANGELOG.md LICENSE
          cd dist
          sha256sum "colab-remote-${{ github.ref_name }}.zip" > SHA256SUMS
      - uses: anchore/sbom-action@v0
        with:
          path: plugins/colab-remote
          format: spdx-json
          output-file: dist/colab-remote-${{ github.ref_name }}.spdx.json
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes --verify-tag
