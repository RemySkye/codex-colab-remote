---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
      - run: python plugins/colab-remote/scripts/validate_repo.py
      - run: uv run --project plugins/colab-remote ruff check plugins/colab-remote
      - run: uv run --project plugins/colab-remote python -m unittest discover -s plugins/colab-remote/tests -v
      - if: runner.os != 'Windows'
        shell: bash
        run: bash -n install.sh

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build archive and checksum
        run: |
          mkdir dist
          zip -r "dist/colab-remote-${{ github.ref_name }}.zip" .agents plugins docs install.ps1 install.sh README.md SECURITY.md CONTRIBUTING.md CHANGELOG.md LICENSE
          cd dist
          sha256sum "colab-remote-${{ github.ref_name }}.zip" > SHA256SUMS
      - uses: anchore/sbom-action@v0
        with:
          path: plugins/colab-remote
          format: spdx-json
          output-file: dist/colab-remote-${{ github.ref_name }}.spdx.json
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes --verify-tag
