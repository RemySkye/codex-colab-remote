---
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
      - name: Validate repository and secrets
        run: python plugins/colab-remote/scripts/validate_repo.py
      - name: Parse PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            [void][scriptblock]::Create((Get-Content -Raw -LiteralPath $_.FullName))
          }
      - name: Test installer with mocked commands
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tests/installer-smoke.ps1
      - name: Test shared Python installer
        run: python tests/test_installer.py -v
      - name: Parse and inspect POSIX installer
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n install.sh
          bash install.sh --help
      - name: Install the official Colab CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          uv tool install --force google-colab-cli==0.6.0
          "$HOME/.local/bin/colab" version
      - name: Lint
        run: uv run --project plugins/colab-remote ruff check plugins/colab-remote install.py tests/test_installer.py
      - name: Test packaged user command
        run: |
          uv run --project plugins/colab-remote colab-remote --help
          uv run --project plugins/colab-remote colab-remote config --help
          uv run --project plugins/colab-remote colab-remote config describe require_secret_enable_approval
          uv build --project plugins/colab-remote --wheel
      - name: Unit and MCP protocol tests
        run: uv run --project plugins/colab-remote python -m unittest discover -s plugins/colab-remote/tests -v
